<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/ai-angler-web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ai_angler_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ai_angler_app</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JavaScript API（ブラウザ用キー：HTTPリファラーで
       tak20250211-cyber.github.io に制限済み。ブラウザキーは公開が前提の設計）。
       地図に加え Places（入力候補）・Geocoding（地名→座標）ライブラリを読み込む。 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAm4afErmrAAPiG9644L5_D3-Zx9vsWbmg&libraries=places&loading=async" async defer></script>
  <script>
    // 地名・駅・建物名の入力候補（Places Autocomplete）と地名→座標（Geocoding）。
    // Flutter(Dart) から呼ぶ薄いラッパー。google.maps 未ロード時は空/nullを返す。
    window.aiAnglerAutocomplete = async function (input) {
      try {
        if (!(window.google && google.maps && google.maps.places)) return [];
        const svc = new google.maps.places.AutocompleteService();
        const res = await svc.getPlacePredictions({
          input: input, language: 'ja', componentRestrictions: { country: 'jp' },
        });
        return (res.predictions || []).map(function (p) {
          return { desc: p.description, placeId: p.place_id };
        });
      } catch (e) { return []; }
    };
    // 座標解決は Places API を使う（Geocoding API はプロジェクト設定によって
    // REQUEST_DENIED になり得るため。Places は入力候補と同じ土台で確実に動く）。
    window.__aiAnglerPlaces = function () {
      return new google.maps.places.PlacesService(document.createElement('div'));
    };
    window.aiAnglerGeocode = function (query) {
      return new Promise(function (resolve) {
        try {
          if (!(window.google && google.maps && google.maps.places)) { resolve(null); return; }
          window.__aiAnglerPlaces().findPlaceFromQuery({
            query: query,
            fields: ['name', 'geometry', 'formatted_address'],
            language: 'ja',
          }, function (res, status) {
            if (status === google.maps.places.PlacesServiceStatus.OK && res && res[0] && res[0].geometry) {
              const loc = res[0].geometry.location;
              resolve({ lat: loc.lat(), lng: loc.lng(), label: res[0].formatted_address || res[0].name || query });
            } else { resolve(null); }
          });
        } catch (e) { resolve(null); }
      });
    };
    window.aiAnglerGeocodePlaceId = function (placeId) {
      return new Promise(function (resolve) {
        try {
          if (!(window.google && google.maps && google.maps.places)) { resolve(null); return; }
          window.__aiAnglerPlaces().getDetails({
            placeId: placeId,
            fields: ['name', 'geometry', 'formatted_address'],
            language: 'ja',
          }, function (res, status) {
            if (status === google.maps.places.PlacesServiceStatus.OK && res && res.geometry) {
              const loc = res.geometry.location;
              resolve({ lat: loc.lat(), lng: loc.lng(), label: res.formatted_address || res.name || '' });
            } else { resolve(null); }
          });
        } catch (e) { resolve(null); }
      });
    };
    // 現在地（navigator.geolocation を直接使う）。iOS Safari では
    // geolocator_web が Permissions API 周りで失敗しやすいため、素の API を
    // ユーザー操作（ボタン）から呼ぶのが最も確実。
    // 戻り値：{lat,lng}（成功）／{err:'denied'|'unavailable'|'timeout'|'unsupported'}（失敗）。
    window.aiAnglerCurrentPosition = function (timeoutMs) {
      return new Promise(function (resolve) {
        try {
          if (!navigator.geolocation) { resolve({ err: 'unsupported' }); return; }
          var done = false;
          var ms = timeoutMs || 20000;
          var timer = setTimeout(function () { if (!done) { done = true; resolve({ err: 'timeout' }); } }, ms);
          navigator.geolocation.getCurrentPosition(function (p) {
            if (done) return; done = true; clearTimeout(timer);
            resolve({ lat: p.coords.latitude, lng: p.coords.longitude });
          }, function (err) {
            if (done) return; done = true; clearTimeout(timer);
            var code = err && err.code;
            resolve({ err: code === 1 ? 'denied' : code === 3 ? 'timeout' : 'unavailable' });
          }, { enableHighAccuracy: false, timeout: ms, maximumAge: 60000 });
        } catch (e) { resolve({ err: 'unsupported' }); }
      });
    };
    // GPSが使えない時の保険：IPからおおよその現在地を取得（許可不要・市区町村レベル）。
    // 戻り値：{lat,lng,label}（成功）／null。
    window.aiAnglerIpLocate = function () {
      return new Promise(function (resolve) {
        var done = false;
        var timer = setTimeout(function () { if (!done) { done = true; resolve(null); } }, 6000);
        fetch('https://ipwho.is/', { cache: 'no-store' })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (done) return; done = true; clearTimeout(timer);
            if (d && d.success !== false && typeof d.latitude === 'number' && typeof d.longitude === 'number') {
              var name = [d.city, d.region].filter(Boolean).join('・');
              resolve({ lat: d.latitude, lng: d.longitude, label: name || 'およその現在地' });
            } else { resolve(null); }
          })
          .catch(function () { if (!done) { done = true; clearTimeout(timer); resolve(null); } });
      });
    };
    // 出発地 → 各目的地の「実際の道路移動時間/距離」（Distance Matrix）。
    // destsJson = "[[lat,lng],...]"、mode = DRIVING|WALKING|BICYCLING。
    // 戻り値：[{min:分, km:キロ}]（経路不明は {min:null,km:null}）。
    window.aiAnglerDistanceMatrix = function (oLat, oLng, destsJson, mode) {
      return new Promise(function (resolve) {
        try {
          const dests = JSON.parse(destsJson);
          const nulls = dests.map(function () { return { min: null, km: null }; });
          if (!(window.google && google.maps)) { resolve(nulls); return; }
          const svc = new google.maps.DistanceMatrixService();
          svc.getDistanceMatrix({
            origins: [new google.maps.LatLng(oLat, oLng)],
            destinations: dests.map(function (d) {
              return new google.maps.LatLng(d[0], d[1]);
            }),
            travelMode: mode || 'DRIVING',
          }, function (res, status) {
            if (status !== 'OK' || !res || !res.rows || !res.rows[0]) {
              resolve(nulls); return;
            }
            resolve(res.rows[0].elements.map(function (e) {
              if (e.status === 'OK' && e.duration && e.distance) {
                return {
                  min: Math.round(e.duration.value / 60),
                  km: Math.round((e.distance.value / 1000) * 10) / 10,
                };
              }
              return { min: null, km: null };
            }));
          });
        } catch (e) {
          try { resolve(JSON.parse(destsJson).map(function () { return { min: null, km: null }; })); }
          catch (_) { resolve([]); }
        }
      });
    };
  </script>
</head>
<body>

</body>
</html>
